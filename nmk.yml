refs:
  - pip://nmk-github!plugin.yml
  - pip://nmk-badges!plugin.yml
  - pip://nmk-python!plugin.yml
  - pip://nmk-vscode!plugin.yml
  - pip://nmk-doc!plugin.yml
  - <workspace>/shared.yml
  - workspace:
      local: ../../shared
      remote: github://dynod/workspace/main/shared

config:
  # Extra project data
  pythonProjectFileItems:
    project:
      description: Build environment setup system, based on Python venv
      scripts:
        buildenv: buildenv.__main__:main

  # Dependencies
  pythonPackageRequirements:
    - Jinja2
    - argcomplete
    - psutil
    - typing_extensions

  # For tests
  venvPkgDeps:
    - pipx>=1.12.0
    - uv>=0.11.0

  # Customize CSS for wider page
  docExtraConfig:
    html_static_path:
      - _static
    html_css_files:
      - css/custom.css

  # Doc snippets -- rename to docSnippets to refresh on interface change
  _docSnippets:
    buildenv.txt: "${venvBin}/buildenv -h"
    install.txt: "${venvBin}/buildenv install -h"
    init.txt: "${venvBin}/buildenv init -h"
    shell.txt: "${venvBin}/buildenv shell -h"
    run.txt: "${venvBin}/buildenv run -h"
    list.txt: "${venvBin}/buildenv list -h"
    lock.txt: "${venvBin}/buildenv lock -h"
    unlock.txt: "${venvBin}/buildenv unlock -h"
    upgrade.txt: "${venvBin}/buildenv upgrade -h"
    install-list-1.txt: "${venvBin}/uvx --with nmk-python buildenv install --list-templates"
